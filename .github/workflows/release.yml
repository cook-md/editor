name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Temporarily narrowed to mac-x64 while debugging the arm64-in-x64-DMG
          # native module issue. Restore the full matrix once a release DMG has
          # been verified with x86_64 .node files end-to-end.
          # - os: macos-latest
          #   platform: mac-arm64
          #   electron_arch: arm64
          #   rust_target: aarch64-apple-darwin
          # Cross-compile x64 from arm64 runner (macos-13 is deprecated and
          # -large runners are paid). Rust + electron-rebuild both support
          # cross-compiling from arm64 mac to x64 natively.
          - os: macos-latest
            platform: mac-x64
            electron_arch: x64
            rust_target: x86_64-apple-darwin
          # - os: windows-latest
          #   platform: win
          # - os: ubuntu-latest
          #   platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cooklang-language-server is referenced from packages/cooklang-native/Cargo.toml
      # as a sibling path (../../../cooklang-language-server). Place it next to the
      # editor checkout — actions/checkout rejects paths outside the workspace, so
      # use git clone directly.
      - name: Clone cooklang-language-server
        shell: bash
        run: |
          git clone --depth 1 https://github.com/cooklang/cooklang-language-server.git \
            "${{ github.workspace }}/../cooklang-language-server"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS cross-compile)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/cooklang-native/target
          key: ${{ runner.os }}-${{ matrix.rust_target || 'host' }}-cargo-${{ hashFiles('packages/cooklang-native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust_target || 'host' }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            dev-packages/*/node_modules
            examples/*/node_modules
          key: ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-nm-v2-${{ hashFiles('package-lock.json', 'lerna.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-nm-v2-

      # native-keymap compiles against libx11/libxkbfile headers on Linux
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: bash
        # For macOS x64 we run on an arm64 runner. Without arch overrides npm
        # resolves optional deps for the host (e.g. installs
        # `@parcel/watcher-darwin-arm64` instead of `-darwin-x64`), and
        # prebuild-install downloads arm64 `.node` prebuilts for drivelist,
        # native-keymap, etc. Those arm64 binaries end up bundled in the x64
        # DMG and crash on launch with "incompatible architecture".
        #
        # `--cpu=x64 --os=darwin` filters optional deps to x64/darwin siblings;
        # `npm_config_arch=x64` makes prebuild-install fetch x64 prebuilts.
        run: |
          if [ "${{ matrix.electron_arch }}" = "x64" ] && [ "${{ runner.os }}" = "macOS" ]; then
            export npm_config_arch=x64
            export npm_config_target_arch=x64
            npm install --cpu=x64 --os=darwin
          else
            npm install
          fi
        env:
          # @vscode/ripgrep and other GitHub-release downloads hit anonymous
          # rate limits (403) without a token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache TypeScript build
        uses: actions/cache@v4
        with:
          path: |
            packages/*/lib
            dev-packages/*/lib
            packages/*/*.tsbuildinfo
            dev-packages/*/*.tsbuildinfo
          key: ${{ runner.os }}-tsc-v1-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-tsc-v1-

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-eb-${{ hashFiles('examples/electron/electron-builder.yml', 'examples/electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-eb-

      - name: Build native addon
        working-directory: packages/cooklang-native
        shell: bash
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --platform --target ${{ matrix.rust_target }}
          else
            npm run build
          fi

      - name: Compile TypeScript
        run: npm run compile

      # `theia rebuild:electron` (invoked by `npm run bundle`) only builds for
      # the host arch (arm64 on macos-latest). When cross-compiling x64 we must
      # rebuild for x64 BEFORE webpack bundles, because webpack's node-loader
      # copies native modules out of node_modules/ into lib/backend/native/.
      # If we rebuild after bundling, those copies stay host-arch.
      - name: Rebuild native deps for x64 target (macOS cross-compile)
        if: matrix.electron_arch == 'x64' && runner.os == 'macOS'
        run: |
          ./node_modules/.bin/electron-rebuild \
            --arch=x64 \
            --force \
            --only=node-pty,native-keymap,find-git-repositories,drivelist,keytar,ssh2,cpu-features

      - name: Bundle Electron app
        working-directory: examples/electron
        shell: bash
        run: |
          # Cross-compile case: native modules are already target-arch from the
          # step above. `npm run bundle` would run `theia rebuild:electron` and
          # clobber them with host-arch (arm64) binaries — run webpack directly.
          if [ "${{ matrix.electron_arch }}" = "x64" ] && [ "${{ runner.os }}" = "macOS" ]; then
            npx theia build --mode development
          else
            npm run bundle
          fi
        env:
          # webpack hits the default 2 GB heap on Windows; give it room
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Package & Publish
        working-directory: examples/electron
        shell: bash
        run: |
          PUBLISH="${{ (github.event_name == 'push' || github.event.inputs.publish == 'true') && 'always' || 'never' }}"
          if [ -n "${{ matrix.electron_arch }}" ]; then
            npx electron-builder --mac --${{ matrix.electron_arch }} --publish "$PUBLISH"
          else
            npx electron-builder --publish "$PUBLISH"
          fi
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
          # Code signing — electron-builder reads these automatically on macOS.
          # Harmless on Windows/Linux matrix rows (ignored).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization — electron-builder reads these when mac.notarize is true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cook-Editor-${{ matrix.platform }}
          path: |
            examples/electron/dist/*.dmg
            examples/electron/dist/*.zip
            examples/electron/dist/*.exe
            examples/electron/dist/*.AppImage
            examples/electron/dist/*.deb
            examples/electron/dist/*.yml
          if-no-files-found: warn
