name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
            electron_arch: arm64
            rust_target: aarch64-apple-darwin
          # Cross-compile x64 from arm64 runner (macos-13 is deprecated and
          # -large runners are paid). Rust + electron-rebuild both support
          # cross-compiling from arm64 mac to x64 natively.
          - os: macos-latest
            platform: mac-x64
            electron_arch: x64
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cooklang-language-server is referenced from packages/cooklang-native/Cargo.toml
      # as a sibling path (../../../cooklang-language-server). Place it next to the
      # editor checkout — actions/checkout rejects paths outside the workspace, so
      # use git clone directly.
      - name: Clone cooklang-language-server
        shell: bash
        run: |
          git clone --depth 1 https://github.com/cooklang/cooklang-language-server.git \
            "${{ github.workspace }}/../cooklang-language-server"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS cross-compile)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/cooklang-native/target
          key: ${{ runner.os }}-${{ matrix.rust_target || 'host' }}-cargo-${{ hashFiles('packages/cooklang-native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust_target || 'host' }}-cargo-
            ${{ runner.os }}-cargo-

      # native-keymap compiles against libx11/libxkbfile headers on Linux
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: npm install
        env:
          # @vscode/ripgrep and other GitHub-release downloads hit anonymous
          # rate limits (403) without a token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native addon
        working-directory: packages/cooklang-native
        shell: bash
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --platform --target ${{ matrix.rust_target }}
          else
            npm run build
          fi

      - name: Compile TypeScript
        run: npm run compile

      - name: Bundle Electron app
        working-directory: examples/electron
        run: npm run bundle
        env:
          # webpack hits the default 2 GB heap on Windows; give it room
          NODE_OPTIONS: --max-old-space-size=8192

      # `theia rebuild:electron` only rebuilds native deps for host arch.
      # When cross-compiling x64 on an arm64 mac runner we need a second pass
      # targeting x64 so node-pty/native-keymap/etc. ship as x64 binaries.
      - name: Rebuild native deps for target arch (macOS cross-compile)
        if: matrix.electron_arch == 'x64'
        run: |
          ./node_modules/.bin/electron-rebuild \
            --arch=x64 \
            --force \
            --only=node-pty,native-keymap,find-git-repositories,drivelist,keytar,ssh2,cpu-features

      - name: Package & Publish
        working-directory: examples/electron
        shell: bash
        run: |
          PUBLISH="${{ (github.event_name == 'push' || github.event.inputs.publish == 'true') && 'always' || 'never' }}"
          if [ -n "${{ matrix.electron_arch }}" ]; then
            npx electron-builder --mac --${{ matrix.electron_arch }} --publish "$PUBLISH"
          else
            npx electron-builder --publish "$PUBLISH"
          fi
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CookEd-${{ matrix.platform }}
          path: |
            examples/electron/dist/*.dmg
            examples/electron/dist/*.zip
            examples/electron/dist/*.exe
            examples/electron/dist/*.AppImage
            examples/electron/dist/*.deb
            examples/electron/dist/*.yml
          if-no-files-found: warn
