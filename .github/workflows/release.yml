name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
            electron_arch: arm64
            rust_target: aarch64-apple-darwin
          # Build x64 on a native Intel runner. `macos-15-intel` is the free
          # standard-runner replacement GitHub introduced when `macos-13` was
          # retired on 2025-12-08 (see GitHub changelog 2025-09-19). Native
          # x64 throughout sidesteps the cross-compile pain of arm64 runners
          # — optional-deps resolve correctly, prebuild-install fetches x64
          # `.node` files, theia rebuild:electron produces x64 binaries.
          - os: macos-15-intel
            platform: mac-x64
            electron_arch: x64
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # cooklang-language-server is referenced from packages/cooklang-native/Cargo.toml
      # as a sibling path (../../../cooklang-language-server). Place it next to the
      # editor checkout — actions/checkout rejects paths outside the workspace, so
      # use git clone directly.
      - name: Clone cooklang-language-server
        shell: bash
        run: |
          git clone --depth 1 https://github.com/cooklang/cooklang-language-server.git \
            "${{ github.workspace }}/../cooklang-language-server"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target (macOS cross-compile)
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/cooklang-native/target
          key: ${{ runner.os }}-${{ matrix.rust_target || 'host' }}-cargo-${{ hashFiles('packages/cooklang-native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust_target || 'host' }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            dev-packages/*/node_modules
            examples/*/node_modules
            # @theia/core's afterInstall generates re-export shims into
            # packages/*/shared — outside node_modules — that tsc requires.
            packages/*/shared
            # @theia/ffmpeg is a node-gyp workspace package; its native
            # addon is built into dev-packages/ffmpeg/build during npm
            # install. Without it, `theia rebuild:electron` crashes with
            # `Cannot find module '../build/Debug/ffmpeg.node'`.
            dev-packages/ffmpeg/build
          key: ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-nm-v3-${{ hashFiles('package-lock.json', 'lerna.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-nm-v3-

      # native-keymap compiles against libx11/libxkbfile headers on Linux.
      # `rpm` is required for electron-builder's RPM target.
      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev rpm

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install
        env:
          # @vscode/ripgrep and other GitHub-release downloads hit anonymous
          # rate limits (403) without a token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On cache hit, npm install is skipped — but the root `postinstall`
      # (`theia-patch && compute-references && lerna run afterInstall`) never
      # runs. `afterInstall` in @theia/core regenerates re-export shims into
      # `packages/core/shared/`, which aren't part of node_modules and so
      # aren't preserved by the cache. Without them tsc fails with
      # `Cannot find module '@theia/core/shared/...'`. Re-run them here.
      - name: Regenerate Theia re-exports on cache hit
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        run: npx lerna run afterInstall

      - name: Cache TypeScript build
        uses: actions/cache@v4
        with:
          path: |
            packages/*/lib
            dev-packages/*/lib
            packages/*/*.tsbuildinfo
            dev-packages/*/*.tsbuildinfo
          key: ${{ runner.os }}-tsc-v1-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-tsc-v1-

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-eb-${{ hashFiles('examples/electron/electron-builder.yml', 'examples/electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.electron_arch || 'host' }}-eb-

      - name: Build native addon
        working-directory: packages/cooklang-native
        shell: bash
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            npx napi build --release --platform --target ${{ matrix.rust_target }}
          else
            npm run build
          fi

      - name: Compile TypeScript
        run: npm run compile

      - name: Bundle Electron app
        working-directory: examples/electron
        run: npm run bundle
        env:
          # webpack hits the default 2 GB heap on Windows; give it room
          NODE_OPTIONS: --max-old-space-size=8192

      # Guard against silent feature drops in the generated frontend index.
      # `frontend` + `frontendElectron` in the same `theiaExtensions` entry
      # causes the generator to drop the `frontend` module on electron targets
      # (see packages/cooklang/package.json). This check catches that class of
      # regression before we ship a broken DMG.
      - name: Verify required frontend modules are registered
        working-directory: examples/electron
        shell: bash
        run: |
          INDEX=src-gen/frontend/index.js
          REQUIRED=(
            '@theia/cooklang/lib/browser/cooklang-frontend-module'
            '@theia/cooklang/lib/electron-browser/cooklang-electron-browser-module'
            '@theia/cooklang-account/lib/browser/cooklang-account-frontend-module'
            '@theia/cooklang-ai/lib/browser/cooklang-ai-frontend-module'
            '@theia/cooklang-branding/lib/browser/cooklang-branding-frontend-module'
          )
          missing=0
          for m in "${REQUIRED[@]}"; do
            if ! grep -qF "$m" "$INDEX"; then
              echo "::error::Missing frontend module: $m"
              missing=1
            fi
          done
          if [ $missing -ne 0 ]; then
            echo "::error::$INDEX is missing required frontend modules — check packages/*/package.json theiaExtensions entries"
            exit 1
          fi
          echo "All required frontend modules are registered."

      - name: Package & Publish
        working-directory: examples/electron
        shell: bash
        run: |
          PUBLISH="${{ (github.event_name == 'push' || github.event.inputs.publish == 'true') && 'always' || 'never' }}"
          if [ -n "${{ matrix.electron_arch }}" ]; then
            npx electron-builder --mac --${{ matrix.electron_arch }} --publish "$PUBLISH"
          else
            npx electron-builder --publish "$PUBLISH"
          fi
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
          # Code signing — electron-builder reads these automatically on macOS.
          # Harmless on Windows/Linux matrix rows (ignored).
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization — electron-builder reads these when mac.notarize is true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cook-Editor-${{ matrix.platform }}
          path: |
            examples/electron/dist/*.dmg
            examples/electron/dist/*.zip
            examples/electron/dist/*.exe
            examples/electron/dist/*.AppImage
            examples/electron/dist/*.deb
            examples/electron/dist/*.rpm
            examples/electron/dist/*.tar.gz
            examples/electron/dist/*.yml
          if-no-files-found: warn
