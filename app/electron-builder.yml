appId: md.cook.editor
productName: Cook Editor
copyright: Copyright © 2026 Cooklang

# RPM (and some other packagers) reject SPDX expressions with parens, WITH,
# and LicenseRef-. Override the license string passed to packaging metadata
# with a single identifier; full legal terms are in the bundled NOTICE.md
# and LICENSE-* files (see extraResources below).
extraMetadata:
  license: AGPL-3.0-only
# Do NOT set electronDist — it would pin to the host-arch Electron installed
# by npm and produce arm64 binaries even inside an x64 DMG. Let electron-
# builder resolve and download the correct-arch Electron per target.
electronVersion: 38.4.0
asar: true
asarUnpack:
  - "**/*.node"
nodeGypRebuild: false
npmRebuild: false

directories:
  buildResources: resources

# node_modules and package.json are copied automatically by electron-builder.
# Theia apps need node_modules at runtime (src-gen requires packages from it).
# Exclude only source files and tests within node_modules to reduce size.
files:
  - src-gen
  - lib
  - proto
  - resources/icon-256.png
  - resources/cooked-logo.svg
  - "!node_modules/**/@theia/**/src/**"
  - "!node_modules/**/@theia/**/lib/**/*.spec.*"
  - "!node_modules/**/@theia/cooklang-native/target/**"
  - "!node_modules/**/@theia/cooklang-native/Cargo.*"
  - "!node_modules/**/@theia/cooklang-native/build.rs"
  - "!node_modules/**/@theia/cooklang-native/src/**"

extraResources:
  - from: ../plugins
    to: app/plugins
  - from: ../LICENSE-EPL
    to: licenses/LICENSE-EPL
  - from: ../LICENSE-GPL-2.0-ONLY-CLASSPATH-EXCEPTION
    to: licenses/LICENSE-GPL-2.0-ONLY-CLASSPATH-EXCEPTION
  - from: ../LICENSE-AGPL
    to: licenses/LICENSE-AGPL
  - from: ../LICENSES/cooklang-theia-linking-exception.txt
    to: licenses/cooklang-theia-linking-exception.txt
  - from: ../LICENSE-MIT.txt
    to: licenses/LICENSE-MIT.txt
  - from: ../LICENSE-vscode.txt
    to: licenses/LICENSE-vscode.txt
  - from: ../NOTICE.md
    to: licenses/NOTICE.md

publish:
  provider: github
  owner: cook-md
  repo: editor

# --- macOS ---
mac:
  icon: resources/icon.icns
  category: public.app-category.lifestyle
  darkModeSupport: true
  protocols:
    - name: cook
      schemes:
        - cook
  target:
    - dmg
    - zip
  # arch-suffix the zip too (dmg sets its own artifactName below); without it,
  # arm64 and x64 zips collide when published from the matrix.
  artifactName: Cook-Editor-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Submit to Apple's notarytool after signing; uses APPLE_* env vars.
  notarize: true

dmg:
  sign: true
  artifactName: Cook-Editor-${arch}.${ext}

# --- Windows ---
win:
  icon: resources/icon.ico
  target:
    - nsis
    - zip

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  deleteAppDataOnUninstall: false
  runAfterFinish: false
  artifactName: Cook-Editor-Setup.${ext}

# --- Linux ---
linux:
  icon: resources/icon-256.png
  category: Utility
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz

appImage:
  artifactName: Cook-Editor.${ext}

deb:
  artifactName: Cook-Editor.${ext}
  depends:
    - libnotify4
    - libxtst6
    - libnss3

rpm:
  artifactName: Cook-Editor.${ext}
  depends:
    - libnotify
    - libXtst
    - nss

afterPack: ./scripts/after-pack.js
