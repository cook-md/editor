syntax = "proto3";

package cookbot;

// ============================================================================
// Cookbot Service - Unified API
// ============================================================================

service CookbotService {
  // Auth & session
  rpc Initialize(InitializeRequest) returns (InitializeResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Chat - thin proxy to Claude (one API call per request, no server-side tool loop)
  rpc SendMessage(ChatRequest) returns (stream ChatChunk);
  rpc GetUsage(GetUsageRequest) returns (UsageStats);

  // Server-side tools (called by client ToolProviders via RPC)
  rpc SearchWeb(SearchWebRequest) returns (SearchWebResponse);
  rpc FetchUrl(FetchUrlRequest) returns (FetchUrlResponse);
  rpc ConvertUrlToCooklang(ConvertUrlRequest) returns (ConvertResponse);
  rpc ConvertTextToCooklang(ConvertTextRequest) returns (ConvertResponse);
}

// ============================================================================
// Session Management
// ============================================================================

message InitializeRequest {
  string custom_instructions = 1;  // Content of COOK.md (optional)
  string client_version = 2;       // Client version for compatibility
  string recipes_dir = 3;          // Path to recipes directory for system prompt
  string auth_token = 4;           // JWT token for authentication
}

message InitializeResponse {
  bool success = 1;
  string server_version = 2;
  string session_id = 3;
  int64 user_id = 4;
  string email = 5;
  int64 token_limit = 6;
}

message LogoutRequest {
  string session_id = 1;
}

message LogoutResponse {
  bool success = 1;
}

// ============================================================================
// Chat - mirrors Anthropic SSE events for clean client mapping
// ============================================================================

message ChatRequest {
  repeated MessageParam messages = 1;  // Full conversation including tool results
  string session_id = 2;
  string auth_token = 3;
  repeated ToolDefinition tools = 4;   // Client's tool definitions for Claude
}

// A message in the conversation (supports multi-part content)
message MessageParam {
  string role = 1;  // "user" or "assistant"
  repeated ContentPart content = 2;
}

// A single part of a message's content
message ContentPart {
  string type = 1;  // "text", "tool_use", "tool_result", "thinking"
  // text
  string text = 2;
  // tool_use
  string tool_use_id = 3;
  string name = 4;
  string input = 5;  // JSON string
  // tool_result
  string tool_result_content = 6;
  bool is_error = 7;
  // thinking
  string thinking = 8;
  string signature = 9;
}

// Tool definition sent by client for Claude
message ToolDefinition {
  string name = 1;
  string description = 2;
  string input_schema = 3;  // JSON Schema string
}

// Streaming response chunk - mirrors Anthropic SSE event types
message ChatChunk {
  oneof event {
    ContentBlockStart content_block_start = 1;
    ContentBlockDelta content_block_delta = 2;
    ContentBlockStop content_block_stop = 3;
    MessageStart message_start = 4;
    MessageDelta message_delta = 5;
    MessageStop message_stop = 6;
    string error = 7;
    ContextStatus context_status = 8;
    CompactionInfo compaction_info = 9;
  }
}

message ContentBlockStart {
  uint32 index = 1;
  string type = 2;  // "text", "thinking", "tool_use"
  // For text blocks
  string text = 3;
  // For thinking blocks
  string thinking = 4;
  // For tool_use blocks
  string id = 5;
  string name = 6;
}

message ContentBlockDelta {
  uint32 index = 1;
  string type = 2;  // "text_delta", "thinking_delta", "signature_delta", "input_json_delta"
  string text = 3;          // For text_delta and thinking_delta
  string partial_json = 4;  // For input_json_delta
  string signature = 5;     // For signature_delta
}

message ContentBlockStop {
  uint32 index = 1;
}

message MessageStart {
  string id = 1;
  string model = 2;
  uint32 input_tokens = 3;
}

message MessageDelta {
  string stop_reason = 1;  // "end_turn", "tool_use", "max_tokens"
  uint32 output_tokens = 2;
}

message MessageStop {
}

// Context status for compaction tracking
message ContextStatus {
  uint32 tokens_used = 1;
  uint32 token_limit = 2;
  float percentage_used = 3;
  bool compaction_in_progress = 4;
}

// Information about compaction that occurred
message CompactionInfo {
  repeated MessageParam compacted_history = 1;
  string summary = 2;
  uint32 tokens_before = 3;
  uint32 tokens_after = 4;
  bool fallback_used = 5;
}

// ============================================================================
// Usage
// ============================================================================

message GetUsageRequest {
  string session_id = 1;
}

message UsageStats {
  int64 input_tokens_used = 1;
  int64 output_tokens_used = 2;
  int64 token_limit = 3;
  string billing_period_start = 4;
  string billing_period_end = 5;
  string subscription_tier = 6;
}

// ============================================================================
// Server-side Tools
// ============================================================================

message SearchWebRequest {
  string query = 1;
  int32 max_results = 2;
  string session_id = 3;
}

message SearchWebResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  string title = 1;
  string url = 2;
  string snippet = 3;
}

message FetchUrlRequest {
  string url = 1;
  string session_id = 2;
}

message FetchUrlResponse {
  string content = 1;
  string title = 2;
}

message ConvertUrlRequest {
  string url = 1;
  string session_id = 2;
}

message ConvertTextRequest {
  string name = 1;
  string text = 2;
  string session_id = 3;
}

message ConvertResponse {
  string cooklang_content = 1;
  string recipe_name = 2;
}
