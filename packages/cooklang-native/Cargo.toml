[package]
name = "cooklang-native"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["napi6", "serde-json", "tokio_rt"] }
napi-derive = "2"
cooklang = { version = "0.18.5", features = ["aisle", "pantry", "shopping_list"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
cooklang-language-server = { path = "../../../cooklang-language-server" }
cooklang-sync-client = "0.4"
chrono = "0.4"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
